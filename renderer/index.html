<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:;" />
  <title>Terminal DS</title>
  <link rel="stylesheet" href="../node_modules/xterm/css/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Split pane container -->
  <div id="pane-container">
    <div id="pane-0" class="pane" data-pane="0">
      <div class="pane-header">
        <span class="pane-label">AEGIS</span>
      </div>
      <div class="pane-terminal"></div>
    </div>
    <div id="pane-1" class="pane" data-pane="1">
      <div class="pane-header">
        <span class="pane-label">shell</span>
      </div>
      <div class="pane-terminal"></div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-shell">●</span>
    <span id="status-info">Terminal DS</span>
  </div>

  <script src="../node_modules/xterm/lib/xterm.js"></script>
  <script src="../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="../node_modules/xterm-addon-web-links/lib/xterm-addon-web-links.js"></script>
  <script src="../node_modules/xterm-addon-search/lib/xterm-addon-search.js"></script>
  <script src="app.js"></script>
</body>
</html>
